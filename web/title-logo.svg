<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c8bff"/>
      <stop offset="1" stop-color="#5b6be0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#5b6be0" flood-opacity="0.28"/>
    </filter>
    <style>
      .ko { font-family: 'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo','Noto Sans KR',sans-serif; }
      .en { font-family: 'Segoe UI','Helvetica Neue',Arial,sans-serif; }
    </style>
  </defs>

  <!-- ===== 엠블럼: 말풍선 + 2호선 순환선 + 하트 ===== -->
  <g filter="url(#soft)">
    <!-- 말풍선 본체 -->
    <rect x="505" y="40" width="190" height="158" rx="40" fill="url(#bubble)"/>
    <!-- 말풍선 꼬리 -->
    <path d="M 556 190 L 556 234 L 600 190 Z" fill="#5b6be0"/>
  </g>

  <!-- 2호선 순환 루프 (말풍선 안) -->
  <circle cx="600" cy="116" r="46" fill="none" stroke="#ffffff" stroke-width="7"/>
  <!-- 역 점 3개 -->
  <circle cx="554" cy="116" r="6.5" fill="#ffffff"/>
  <circle cx="646" cy="116" r="6.5" fill="#ffffff"/>
  <circle cx="600" cy="162" r="6.5" fill="#ffffff"/>
  <!-- 상단 역 = 하트(로맨스) -->
  <path d="M 600 60
           c -7 -10 -24 -7 -24 7
           c 0 10 13 18 24 27
           c 11 -9 24 -17 24 -27
           c 0 -14 -17 -17 -24 -7 Z"
        fill="#2fb574"/>

  <!-- ===== 메인 타이틀 ===== -->
  <text x="600" y="350" text-anchor="middle" class="ko"
        font-size="96" font-weight="800" fill="#2b2f45"
        letter-spacing="2">오픈챗에서 만나요</text>

  <!-- 강조 밑줄 -->
  <rect x="470" y="378" width="260" height="9" rx="4.5" fill="#6c7cf0"/>
  <rect x="744" y="378" width="44" height="9" rx="4.5" fill="#2fb574"/>

  <!-- 한글 태그라인 -->
  <text x="600" y="448" text-anchor="middle" class="ko"
        font-size="32" font-weight="500" fill="#6b7185"
        letter-spacing="1">2호선을 타고 시작되는 청춘 연애</text>

  <!-- 영문 라인 -->
  <text x="600" y="500" text-anchor="middle" class="en"
        font-size="20" font-weight="600" fill="#9aa0b3"
        letter-spacing="8">OPENCHAT · SEOUL LINE 2 ROMANCE</text>
</svg>
