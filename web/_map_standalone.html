<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Map standalone test</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #0a0c14; padding: 30px; display:flex; justify-content:center; }
    #game {
      position: relative;
      width: 800px; height: 700px;
      overflow: hidden;
      background: #15171f;
      border: 1px solid #444;
      border-radius: 12px;
    }
    #overlay { position: absolute; inset: 0; }
    #toast   { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); }
  </style>
</head>
<body>
<div id="game">
  <div id="overlay" class="hidden"></div>
  <div id="toast"></div>
</div>
<script type="module">
import { makeMap } from './src/ui/map.js';

const root = document.getElementById('game');
// Seed: jamsil+sinchon+hapjeong unlocked; seongsu = most recently unlocked (currentStation)
const fakeState = {
  vars: { __stations: ['jamsil', 'sinchon', 'hapjeong', 'seongsu'] },
};
const m = makeMap(root, { sys: null, state: fakeState });
// Don't await — let it render without blocking
m.show();
</script>
</body>
</html>
